<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Caitlin's 40th · Display Mode</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Playfair+Display:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Display: Title -->
  <section id="d-title" class="screen active">
    <div class="frame display-frame">
      <div class="crest">40</div>
      <h1 class="header-caps-lg">Caitlin's</h1>
      <h2 class="script-text">Birthday Trivia</h2>
      <div class="divider"></div>
      <p class="body-text" style="margin-top:0.5rem;">March 21, 2026</p>
    </div>
  </section>

  <!-- Display: Section Intro -->
  <section id="d-intro" class="screen">
    <div class="frame display-frame">
      <p class="section-round" id="d-intro-round"></p>
      <div class="section-icon" id="d-intro-icon"></div>
      <h2 class="section-title" id="d-intro-title"></h2>
      <div class="divider"></div>
      <p class="section-desc" id="d-intro-desc"></p>
      <p class="section-instructions" id="d-intro-instructions" style="margin-top:0.5rem;"></p>
    </div>
  </section>

  <!-- Display: Question -->
  <section id="d-question" class="screen">
    <div class="frame display-frame" style="justify-content:flex-start; text-align:left;">
      <div class="question-header" style="width:100%;">
        <span class="header-caps" id="d-q-header"></span>
        <span class="header-caps question-points" id="d-q-points"></span>
      </div>
      <div class="divider-full"></div>
      <div id="d-q-body" style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; width:100%; overflow-y:auto;">
        <!-- Populated by JS -->
      </div>
    </div>
  </section>

  <!-- Display: Answer Reveal -->
  <section id="d-answer" class="screen">
    <div class="frame display-frame">
      <div class="question-header" style="width:100%;">
        <span class="header-caps" id="d-a-header"></span>
      </div>
      <div class="divider-full"></div>
      <div id="d-a-body" style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; width:100%; gap:0.75rem;">
        <!-- Populated by JS -->
      </div>
    </div>
  </section>

  <p class="display-nav-hint">Click or press Space to advance</p>

  <script src="questions.js"></script>
  <script src="display.js"></script>
</body>
</html>
